<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- Firebase SDK — must load before main script -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<title>Mika Glo — The Hat</title>
<style>
  :root {
    --pink: #ff2d78;
    --pink-light: #ff6ba8;
    --pink-glow: rgba(255,45,120,0.25);
    --pink-dim: rgba(255,45,120,0.5);
    --bg: #07070d;
    --white: #ffffff;
    --off-white: #f5f5f8;
    --felt: #111118;
    --felt-mid: #1a1a24;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%; overflow:hidden;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    touch-action: manipulation;
  }

  /* ── STARFIELD ── */
  #stars-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1;
  }

  /* ── BRANDING ── */
  #branding {
    position: fixed; top: clamp(18px, 3vh, 42px); left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 100;
    pointer-events: none;
    white-space: nowrap;
  }
  #branding-name {
    font-size: clamp(26px, 4.2vw, 64px);
    letter-spacing: clamp(6px, 1.1vw, 18px);
    text-transform: uppercase;
    color: rgba(255,255,255,0.93);
    font-weight: 200;
    text-shadow: 0 0 40px rgba(255,45,120,0.3);
    line-height: 1;
  }
  #branding-sub {
    font-size: clamp(9px, 0.75vw, 12px);
    letter-spacing: clamp(4px, 0.7vw, 9px);
    text-transform: uppercase;
    color: rgba(255,255,255,0.32);
    font-weight: 400;
    margin-top: clamp(4px, 0.6vh, 8px);
  }

  /* ── COUNTER ── */
  #counter {
    position: fixed; top: clamp(85px, 13vh, 145px); left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.22);
    font-size: clamp(9px, 0.72vw, 11px);
    letter-spacing: clamp(2px, 0.4vw, 4px);
    text-transform: uppercase;
    font-weight: 300;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  /* ── HAT STAGE ── */
  #hat-stage {
    position: relative;
    width: min(600px, 96vw); height: min(440px, 70vh);
    cursor: pointer;
    user-select: none;
  }

  @keyframes hatFloat {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50%       { transform: translateX(-50%) translateY(-8px); }
  }

  #hat-rebuild {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: min(660px, 100vw); height: auto;
    z-index: 5;
    transition: transform 0.12s ease;
    overflow: visible;
    animation: hatFloat 5s ease-in-out infinite;
  }

  #hat-stage:active #hat-rebuild {
    transform: translateX(-50%) scale(0.98) translateZ(0);
  }

  #hat-shadow {
    position: absolute; bottom: 2%; left: 50%;
    transform: translateX(-50%);
    width: 55%; height: 20px;
    background: radial-gradient(ellipse, rgba(255,45,120,0.18) 0%, rgba(0,0,0,0) 70%);
    border-radius: 50%;
    z-index: 1;
    pointer-events: none;
    filter: blur(6px);
  }

  #hat-img {
    width: 100%; height: auto; display: block;
    pointer-events: none;
    transition: opacity 0.4s ease, filter 0.4s ease;
  }

  #hat-img.empty {
    opacity: 0.35;
    filter: grayscale(0.7) brightness(0.65);
    transition: opacity 0.8s ease, filter 0.8s ease;
  }

  #hat-slips {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    overflow: visible;
    pointer-events: none;
  }

@keyframes slipPartL { 0%,100%{transform:translateX(0) rotate(0deg);} 30%,70%{transform:translateX(-8px) rotate(-5deg);} }
  @keyframes slipPartR { 0%,100%{transform:translateX(0) rotate(0deg);} 30%,70%{transform:translateX(8px) rotate(5deg);} }
  #slips-left.parting  { animation: slipPartL 1.6s ease-in-out forwards; }
  #slips-right.parting { animation: slipPartR 1.6s ease-in-out forwards; }

  /* ── HAND ── */
  #hand-container {
    position: absolute;
    left: 0;
    top: -25%;            /* JS overrides this with exact px after image loads */
    width: clamp(500px, 120vw, 860px);
    height: auto;
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transform: translateX(var(--hand-x-start, -130vw));
  }

  #hand-container img {
    width: 100%; height: auto; display: block;
    transform: scaleX(-1);       /* flip: fingers now on RIGHT, arm extends LEFT off-screen */
    mix-blend-mode: multiply;    /* remove white background on dark app bg */
    filter: drop-shadow(0px 10px 18px rgba(0,0,0,0.55));  /* depth shadow over scene */
  }

  #hand-container.animating {
    animation: handPull 2.4s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  /* Long arm sweeps in from left, fingers reach hat, retreats left — arm end never seen.
     CSS variables set dynamically by positionHand() for perfect alignment on every device.
     translateY arc + rotation give a natural human reach feel. */
  @keyframes handPull {
    0%   { opacity: 0;   transform: translateX(var(--hand-x-start, -130vw)) translateY(0px)   rotate(-4deg); }
    10%  { opacity: 1;   transform: translateX(var(--hand-x-enter, -80vw))  translateY(6px)   rotate(-3deg); }
    36%  { opacity: 1;   transform: translateX(var(--hand-x-peak,  -55vw))  translateY(16px)  rotate(-1deg); }
    52%  { opacity: 1;   transform: translateX(var(--hand-x-hold,  -57vw))  translateY(14px)  rotate(-1deg); }
    74%  { opacity: 1;   transform: translateX(var(--hand-x-enter, -80vw))  translateY(6px)   rotate(-3deg); }
    90%  { opacity: 0.4; transform: translateX(var(--hand-x-exit,  -110vw)) translateY(2px)   rotate(-4deg); }
    100% { opacity: 0;   transform: translateX(var(--hand-x-start, -130vw)) translateY(0px)   rotate(-4deg); }
  }

  /* ── TAP HINT ── */
  #tap-hint {
    position: fixed; bottom: clamp(74px, 10vh, 108px); left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.18);
    font-size: clamp(9px, 0.72vw, 11px);
    letter-spacing: clamp(3px, 0.5vw, 6px);
    text-transform: uppercase;
    font-weight: 300;
    animation: hintPulse 3s ease-in-out infinite;
    pointer-events: none; z-index: 100;
    white-space: nowrap;
  }

  @keyframes hintPulse {
    0%,100% { opacity:0.25; }
    50% { opacity:0.75; }
  }

  #no-slips {
    position: fixed; bottom: clamp(100px,14vh,140px); left:50%; transform:translateX(-50%);
    color: rgba(255,45,120,0.45);
    font-size: clamp(10px,0.85vw,13px);
    letter-spacing: 3px;
    text-align: center; pointer-events: none;
    display: none; white-space: nowrap;
    font-weight: 300;
  }

  /* ── FILTERS ── */
  #filters {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: clamp(10px,1.4vh,18px) clamp(16px,3vw,40px) clamp(20px,3.4vh,36px);
    display: flex; flex-wrap: nowrap; gap: clamp(6px,0.55vw,10px);
    justify-content: safe center;
    align-items: center;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    background: linear-gradient(to top, rgba(7,7,13,0.98) 52%, transparent 100%);
    z-index: 100;
  }
  #filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    padding: clamp(6px, 0.75vh, 10px) clamp(14px, 1.2vw, 24px);
    border-radius: 100px;
    border: 1px solid rgba(255,45,120,0.22);
    background: transparent;
    color: rgba(255,255,255,0.35);
    font-size: clamp(10px, 0.72vw, 12.5px);
    letter-spacing: clamp(1.5px, 0.2vw, 2.5px);
    text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    font-family: -apple-system, sans-serif;
    font-weight: 400;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .filter-btn.active {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
    box-shadow: 0 0 16px rgba(255,45,120,0.4);
  }


  /* ── SLIP OVERLAY ── */
  #slip-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
  }

  #slip-overlay.visible { pointer-events: all; }

  #slip-overlay-bg {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.88);
    opacity: 0; transition: opacity 0.3s;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  }

  #slip-overlay.visible #slip-overlay-bg { opacity: 1; }

  /* ── FLIP CARD ── */
  #card-scene {
    position: relative; z-index: 1;
    width: min(360px, 92vw);
    height: 320px;
    perspective: 900px;
    transform: scale(0.78) translateY(36px);
    opacity: 0;
    transition: transform 0.52s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
    cursor: pointer;
  }

  #slip-overlay.visible #card-scene {
    transform: scale(1) translateY(0);
    opacity: 1;
  }

  #card-inner {
    position: relative; width: 100%; height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  #card-inner.flipped {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow:
      0 32px 80px rgba(0,0,0,0.85),
      0 0 60px rgba(255,45,120,0.08),
      inset 0 1px 0 rgba(255,255,255,0.05);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
  }

  /* FRONT — name only */
  #card-front {
    background: linear-gradient(145deg, rgba(22,18,36,0.97) 0%, rgba(14,11,24,0.99) 100%);
    border-top: 1px solid rgba(255,45,120,0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 36px 28px;
    text-align: center;
  }

  .slip-category {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--cat-color, var(--pink));
    font-size: 9px; letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 20px;
    font-weight: 600;
  }

  .slip-name {
    font-family: 'Georgia', serif;
    font-size: clamp(22px, 4vw, 38px); font-weight: 200;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.92);
    line-height: 1.2;
    margin-bottom: 0;
  }

  /* ── CARD PIN BUTTON ── */
  #card-pin-btn {
    position: absolute;
    top: 14px; right: 14px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, background 0.18s;
    z-index: 2;
  }
  #card-pin-btn::after {
    content: '★';
    font-size: 13px;
    color: rgba(255,255,255,0.2);
    transition: color 0.2s;
    line-height: 1;
  }
  #card-pin-btn.pinned {
    background: rgba(255,255,255,0.09);
  }
  #card-pin-btn.pinned::after {
    color: rgba(255,255,255,0.85);
  }
  #card-pin-btn:active { transform: scale(0.82); }

  /* flip hint */
  .flip-hint {
    position: absolute; bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: rgba(255,255,255,0.2);
    font-family: -apple-system, sans-serif;
    animation: hintPulse 2s ease-in-out infinite;
  }

  /* BACK — hook + actions */
  #card-back {
    background: linear-gradient(145deg, rgba(22,18,36,0.97) 0%, rgba(14,11,24,0.99) 100%);
    border-top: 1px solid rgba(255,45,120,0.3);
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
    padding: 24px 24px 18px;
  }

  /* Short hook — big, bold, the headline */
  .slip-hook-short {
    font-family: 'Georgia', serif;
    font-size: 18px; font-weight: bold; line-height: 1.5;
    color: rgba(255,255,255,0.88);
    margin-bottom: 10px;
    flex-shrink: 0;
  }

  /* Expand button */
  .expand-btn {
    background: none; border: none;
    font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--cat-color, var(--pink));
    cursor: pointer; padding: 0; margin-bottom: 10px;
    font-family: -apple-system, sans-serif;
    font-weight: 500; text-align: left;
    opacity: 0.7; flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .expand-btn:active { opacity: 1; }
  .expand-btn.hidden { display: none; }

  /* Long hook — italic, smaller, hidden by default */
  .slip-hook-long {
    font-family: 'Georgia', serif;
    font-size: 13px; line-height: 1.65;
    color: rgba(255,255,255,0.5);
    font-style: italic;
    margin-bottom: 10px;
    overflow-y: auto;
    max-height: 120px;
    flex-shrink: 0;
    display: none;
  }
  .slip-hook-long.visible { display: block; }

  /* Spacer so actions stay at bottom */
  .hook-spacer { flex: 1; }

  .slip-actions {
    display: flex; gap: 8px; flex-shrink: 0;
  }

  .slip-btn {
    padding: 11px 16px;
    border-radius: 6px;
    border: none;
    font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    font-weight: 500;
    transition: all 0.15s;
    flex: 1;
  }

  .slip-btn-used {
    background: var(--cat-color, var(--pink));
    color: white;
    box-shadow: 0 4px 14px rgba(0,0,0,0.2);
  }

  .slip-btn-used:active { transform: scale(0.97); box-shadow: none; }

  .slip-btn-close {
    background: rgba(255,255,255,0.06);
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .slip-btn-close:active { background: rgba(255,255,255,0.1); }

  /* ── FLY USED ANIMATION ── */
  @keyframes cardFlyUp {
    0%   { transform: scale(1) translateY(0) rotate(0deg); opacity: 1; }
    15%  { transform: scale(1.04) translateY(-18px) rotate(-1.5deg); opacity: 1; }
    100% { transform: scale(0.75) translateY(-130vh) rotate(7deg); opacity: 0; }
  }

  #card-scene.fly-used {
    animation: cardFlyUp 0.55s cubic-bezier(0.4, 0, 0.6, 1) forwards;
    pointer-events: none;
  }

  /* ── ICON BUTTONS ── */
  .icon-btn {
    position: fixed;
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .icon-btn:active { background: rgba(255,45,120,0.15); border-color: var(--pink-dim); color: var(--pink-light); }

  #menu-btn { top: 16px; right: 16px; }

  /* ── DRAWER ── */
  #drawer {
    position: fixed; top: 0; right: -100%;
    width: min(340px, 100vw); height: 100%;
    background: #0c0c14;
    border-left: 1px solid rgba(255,255,255,0.06);
    z-index: 300;
    transition: right 0.32s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #drawer.open { right: 0; }

  #drawer-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 290;
    opacity: 0; pointer-events: none;
    transition: opacity 0.32s;
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  #drawer-overlay.visible { opacity: 1; pointer-events: all; }

  .drawer-header {
    position: sticky; top: 0;
    padding: 18px 20px;
    background: #0c0c14;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: space-between;
    z-index: 1;
  }
  .drawer-header h2 {
    color: white;
    font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
    font-weight: 300;
  }
  .drawer-header button {
    background: none; border: none;
    color: rgba(255,255,255,0.4); font-size: 20px; cursor: pointer;
    padding: 4px 6px; line-height: 1;
    transition: color 0.2s;
  }
  .drawer-header button:active { color: var(--pink); }

  .drawer-section {
    padding: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .drawer-title {
    color: rgba(255,45,120,0.7);
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 14px; font-weight: 500;
  }
  #drawer-pin-filter-btn {
    background: none;
    border: 1px solid rgba(255,215,0,0.25);
    color: rgba(255,215,0,0.4);
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 3px 10px; border-radius: 20px;
    cursor: pointer; font-weight: 500;
    font-family: -apple-system, sans-serif;
    transition: all 0.2s;
  }
  #drawer-pin-filter-btn.active {
    background: rgba(255,215,0,0.12);
    border-color: #ffd700;
    color: #ffd700;
  }

  .form-field { margin-bottom: 12px; }
  .form-field label {
    display: block;
    color: rgba(255,255,255,0.3);
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-field input, .form-field textarea, .form-field select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    padding: 10px 12px;
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-family: -apple-system, sans-serif;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus {
    border-color: var(--pink-dim);
  }
  .form-field textarea { min-height: 80px; resize: vertical; }
  .form-field select option { background: #0c0c14; }

  .submit-btn {
    width: 100%; padding: 12px;
    background: var(--pink);
    border: none; border-radius: 6px;
    color: white;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; font-weight: 500;
    box-shadow: 0 4px 20px rgba(255,45,120,0.3);
    transition: opacity 0.15s;
    margin-top: 4px;
  }
  .submit-btn:active { opacity: 0.8; }

  .export-btn {
    width: 100%; padding: 11px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    color: rgba(255,255,255,0.5);
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .export-btn:active { border-color: var(--pink-dim); color: var(--pink-light); }

  .story-item {
    padding: 11px 2px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: background 0.15s;
    border-radius: 6px;
    margin: 0 -4px; padding-left: 4px; padding-right: 4px;
  }
  .story-item:active { background: rgba(255,255,255,0.03); }
  .story-item-text { flex: 1; min-width: 0; }
  .story-item-name {
    color: rgba(255,255,255,0.75);
    font-size: 13px; font-family: 'Georgia', serif;
    margin-bottom: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .story-item-cat {
    color: rgba(255,45,120,0.45);
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  }
  .story-item-chevron {
    color: rgba(255,255,255,0.12); font-size: 12px;
    flex-shrink: 0; margin-right: 2px;
  }
  .story-item-del {
    background: none; border: none;
    color: rgba(255,255,255,0.12); font-size: 18px;
    cursor: pointer; padding: 0 2px;
    flex-shrink: 0; line-height: 1;
    transition: color 0.2s;
  }
  .story-item-del:active { color: var(--pink); }
  .empty-state {
    color: rgba(255,255,255,0.12);
    font-size: 12px; text-align: center;
    padding: 20px 16px;
    letter-spacing: 1px;
  }

  /* ── ENTRANCE ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  /* entrance animations defined later in PAGE ENTRANCE block */

  /* ── MOBILE ── */
  @media (max-width: 680px) {
    /* Title — bigger on mobile, vw-based so it reads on any phone */
    #branding-name {
      font-size: clamp(30px, 8.5vw, 46px);
      letter-spacing: clamp(5px, 1.6vw, 9px);
    }
    #branding-sub {
      font-size: 10px;
      letter-spacing: 4px;
      margin-top: 5px;
    }
    /* Counter sits closer to title on smaller screens */
    #counter {
      top: clamp(75px, 14vh, 110px);
      font-size: 9px;
      letter-spacing: 2px;
    }
    /* Hat stage — cap height so it leaves room above and below */
    #hat-stage {
      width: min(440px, 94vw);
      height: min(340px, 50vh);
    }
    #hat-rebuild {
      width: min(480px, 98vw);
    }
    /* Tap hint clears the filter strip with room to breathe */
    #tap-hint {
      bottom: clamp(96px, 13.5vh, 130px);
      font-size: 9px;
      letter-spacing: 3px;
    }
    #no-slips {
      bottom: clamp(108px, 15vh, 148px);
    }
    /* Filter strip — proper mobile touch targets */
    #filters {
      padding: 12px 20px env(safe-area-inset-bottom, 26px);
      padding-bottom: max(26px, env(safe-area-inset-bottom, 26px));
      gap: 8px;
      justify-content: flex-start;
    }
    .filter-btn {
      padding: 11px 18px;
      font-size: 11px;
      letter-spacing: 1.5px;
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 100px;
    }
    .filter-btn.active {
      box-shadow: 0 0 12px rgba(255,45,120,0.5);
    }
  }

  /* ── PINK GLOW AMBIENT ── */
  #hat-glow {
    display: none;
    pointer-events: none;
  }

  /* ── EPISODE INPUT ON CARD ── */
  #episode-input-wrap {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 8px; flex-shrink: 0;
  }
  #episode-label {
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    color: rgba(255,255,255,0.25); flex-shrink: 0;
    font-family: -apple-system, sans-serif;
  }
  #episode-input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 5px 9px;
    font-size: 12px; color: rgba(255,255,255,0.75);
    outline: none;
    font-family: -apple-system, sans-serif;
    transition: border-color 0.15s;
  }
  #episode-input:focus { border-color: rgba(255,45,120,0.35); }
  #episode-input::placeholder { color: rgba(255,255,255,0.2); }

  /* ── SOURCE LINKS ON CARD ── */
  #source-links {
    display: none;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  #source-links.has-links { display: flex; }
  .source-link-btn {
    background: none; border: none;
    font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--cat-color, var(--pink));
    cursor: pointer; padding: 0;
    opacity: 0.65; text-align: left;
    font-family: -apple-system, sans-serif;
    font-weight: 500;
    transition: opacity 0.15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .source-link-btn:active { opacity: 1; }

  /* ── PREP NOTES ON CARD ── */
  #card-notes {
    display: none;
    font-size: 11.5px; line-height: 1.55;
    color: rgba(255,255,255,0.35);
    font-style: italic;
    margin-bottom: 8px; flex-shrink: 0;
    padding: 6px 8px;
    background: rgba(255,255,255,0.04);
    border-radius: 4px;
    border-left: 2px solid rgba(255,45,120,0.25);
    font-family: -apple-system, sans-serif;
  }

  /* ── STORY PROFILE SHEET ── */
  #story-sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 400; opacity: 0; pointer-events: none;
    transition: opacity 0.28s;
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
  }
  #story-sheet-overlay.visible { opacity: 1; pointer-events: all; }

  #story-sheet {
    position: fixed; bottom: -100%; left: 0; right: 0;
    max-height: 88vh;
    background: #0b0b15;
    border-radius: 20px 20px 0 0;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 401;
    transition: bottom 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #story-sheet.open { bottom: 0; }

  .sheet-handle {
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-header {
    padding: 14px 20px 4px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #sheet-cat-badge {
    display: inline-block;
    padding: 3px 10px; border-radius: 20px;
    background: rgba(255,255,255,0.06);
    font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
    font-weight: 600; color: var(--pink);
  }
  #sheet-pin-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.2); font-size: 18px;
    cursor: pointer; padding: 4px 6px; line-height: 1;
    transition: color 0.2s, transform 0.2s;
    margin-right: 2px;
  }
  #sheet-pin-btn.pinned {
    color: #ffd700;
    transform: rotate(-20deg);
  }
  #sheet-pin-btn:active { transform: scale(0.85) rotate(-20deg); }
  .story-pin-star {
    font-size: 9px;
    color: #ffd700;
    margin-right: 5px;
    flex-shrink: 0;
    line-height: 1;
    filter: drop-shadow(0 0 3px rgba(255,215,0,0.7));
    align-self: center;
  }
  #sheet-close-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.3); font-size: 20px;
    cursor: pointer; padding: 4px 6px; line-height: 1;
    transition: color 0.2s;
  }
  #sheet-close-btn:active { color: var(--pink); }

  .sheet-body { padding: 10px 20px 32px; }
  #sheet-name {
    font-family: 'Georgia', serif;
    font-size: 26px; font-weight: bold;
    color: rgba(255,255,255,0.92);
    line-height: 1.2; margin-bottom: 18px;
  }
  .sheet-section { margin-bottom: 16px; }
  .sheet-label {
    color: rgba(255,45,120,0.55);
    font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase;
    margin-bottom: 6px; font-weight: 500;
  }
  .sheet-hook-short {
    font-family: 'Georgia', serif;
    font-size: 15px; font-weight: bold;
    color: rgba(255,255,255,0.8); line-height: 1.5;
  }
  .sheet-hook-long {
    font-family: 'Georgia', serif;
    font-size: 13px; font-style: italic;
    color: rgba(255,255,255,0.45); line-height: 1.6;
  }
  #sheet-notes-input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);

    font-family: -apple-system, sans-serif;

  #sheet-url-input:focus { border-color: rgba(255,45,120,0.35) !important; }

  #sheet-links-list { display: flex; flex-direction: column; gap: 6px; }
  .sheet-link-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
  }
  .sheet-link-anchor {
    flex: 1; min-width: 0;
    color: var(--pink-light);
    font-size: 12px; letter-spacing: 0.3px;
    text-decoration: none;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-family: -apple-system, sans-serif;
  }
  .sheet-link-anchor:active { opacity: 0.7; }
  .sheet-link-del {
    background: none; border: none;
    color: rgba(255,255,255,0.2); font-size: 16px;
    cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0;
    transition: color 0.15s;
  }
  .sheet-link-del:active { color: var(--pink); }
  #sheet-episode-wrap {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 12px;
    background: rgba(255,45,120,0.08);
    border: 1px solid rgba(255,45,120,0.2);
    border-radius: 20px;
    color: var(--pink-light); font-size: 11px; letter-spacing: 1px;
  }
  .sheet-save-btn {
    width: 100%; padding: 13px;
    background: var(--pink); border: none; border-radius: 8px;
    color: white; font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; font-weight: 500; margin-top: 6px;
    box-shadow: 0 4px 20px rgba(255,45,120,0.28);
    transition: opacity 0.15s;
  }
  .sheet-save-btn:active { opacity: 0.8; }

  /* ── DRAWER SEARCH ── */
  .drawer-search {
    padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    position: sticky; top: 0; background: #0c0c14; z-index: 2;
  }
  .drawer-search input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px; padding: 9px 14px;
    color: rgba(255,255,255,0.85); font-size: 14px;
    font-family: -apple-system, sans-serif;
    outline: none; transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .drawer-search input::placeholder { color: rgba(255,255,255,0.18); }
  .drawer-search input:focus { border-color: rgba(255,45,120,0.35); }

  /* ── NOTES IN DRAWER ── */
  .story-item-episode {
    color: rgba(255,255,255,0.28);
    font-size: 9px; letter-spacing: 1px;
    margin-top: 2px;
  }
  .story-notes-toggle {
    background: none; border: none;
    color: rgba(255,45,120,0.4);
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer; padding: 0; margin-top: 4px; display: block;
    font-family: -apple-system, sans-serif;
    transition: color 0.15s;
  }
  .story-notes-toggle:active { color: var(--pink); }
  .story-notes-edit {
    display: none; margin-top: 6px;
  }
  .story-notes-edit.visible { display: block; }
  .story-notes-edit textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 6px 8px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    font-family: -apple-system, sans-serif;
    min-height: 52px; resize: none; outline: none;
    transition: border-color 0.15s;
  }
  .story-notes-edit textarea:focus { border-color: rgba(255,45,120,0.3); }

  /* ── PAGE ENTRANCE ── */
  @keyframes enterUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0);    }
  }
  @keyframes enterFade {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* #branding uses transform:translateX(-50%) for centering — fade only, no translateY */
  #branding  { animation: enterFade 0.72s ease                       0.05s both; }
  #hat-stage { animation: enterUp   0.85s cubic-bezier(0.4,0,0.2,1) 0.18s both; }
  #counter   { animation: enterFade 0.55s ease                       0.32s both; }
  #tap-hint  { animation: enterFade 0.55s ease                       0.52s both; }
  #filters   { animation: enterUp   0.65s cubic-bezier(0.4,0,0.2,1) 0.38s both; }

  /* ── CARD GLITTER ── */
  .glitter {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 250;
    animation: glitterDrift var(--dur, 1.6s) ease-out var(--delay, 0s) both;
  }
  @keyframes glitterDrift {
    0%   { opacity: 0;                      transform: translate(0,0) scale(1); }
    18%  { opacity: var(--peak-op, 0.75);                                        }
    100% { opacity: 0;                      transform: translate(var(--tx), var(--ty)) scale(0.2); }
  }

  /* ── SHOOTING STAR ── */
  .shooting-star {
    position: fixed;
    width: 90px; height: 1px;
    border-radius: 1px;
    background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.45) 60%, rgba(255,255,255,0.7) 100%);
    pointer-events: none;
    z-index: 2; /* below hat (z-index 5) — star stays in sky layer, never crosses hat */
    animation: shootStar 1.1s ease-out forwards;
  }
  @keyframes shootStar {
    0%   { opacity: 0;   transform: rotate(var(--angle)) translateX(0px);   }
    15%  { opacity: 0.6;                                                      }
    100% { opacity: 0;   transform: rotate(var(--angle)) translateX(220px); }
  }
</style>
</head>

<!-- Starfield canvas -->
<canvas id="stars-canvas"></canvas>

<div id="app">

        <g id="slips-left"></g>

      </svg>
    </div>

  <div id="tap-hint">tap to pull</div>
  <div id="no-slips">No slips in this category</div>

  <!-- Filters -->

    <button class="filter-btn" data-cat="Companies">Companies</button>
    <button class="filter-btn" data-cat="People">People</button>
    <button class="filter-btn" data-cat="Artists">Artists</button>
    <button class="filter-btn" data-cat="Science">Science</button>
    <button class="filter-btn" data-cat="Inventions">Inventions</button>
    <button class="filter-btn" data-cat="Useful Things">Useful</button>
    <button class="filter-btn" data-cat="Food">Food</button>
    <button class="filter-btn" data-cat="History">History</button>
    <button class="filter-btn" data-cat="Movements">Movements</button>
  </div>
</div>

<!-- Buttons -->
<button class="icon-btn" id="menu-btn">≡</button>

<!-- Slip overlay -->
<div id="slip-overlay">
  <div id="slip-overlay-bg"></div>
  <div id="card-scene">
    <div id="card-inner">
      <!-- FRONT: name only -->
      <div class="card-face" id="card-front">
        <button id="card-pin-btn" aria-label="Pin story"></button>
        <div class="slip-category" id="slip-cat-badge">Companies</div>
        <div class="slip-name" id="slip-name-text">Story Name</div>

        <div class="slip-hook-short" id="slip-hook-short"></div>

          <span id="episode-label">Episode</span>
          <input type="text" id="episode-input" placeholder="Ep 1 (optional)" maxlength="40">

          <button class="slip-btn slip-btn-used" id="btn-mark-used">✓ Used</button>
          <button class="slip-btn slip-btn-close" id="btn-close-slip">Put Back</button>
        </div>
      </div>
    </div>

</div>

<!-- Story Profile Sheet -->
<div id="story-sheet-overlay"></div>
<div id="story-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <div id="sheet-cat-badge"></div>
    <div style="display:flex;align-items:center;gap:4px">
      <button id="sheet-pin-btn" title="Pin story">📌</button>
      <button id="sheet-close-btn">✕</button>
    </div>
  </div>
  <div class="sheet-body">
    <div id="sheet-name"></div>
    <div class="sheet-section" id="sheet-hook-short-section">
      <div class="sheet-label">Hook</div>
      <div id="sheet-hook-short" class="sheet-hook-short"></div>
    </div>
    <div class="sheet-section" id="sheet-hook-long-section">
      <div class="sheet-label">Full Story</div>
      <div id="sheet-hook-long" class="sheet-hook-long"></div>
    </div>
    <div class="sheet-section">
      <div class="sheet-label">Prep Notes</div>

<script>
// ══════ STARS ══════
(function() {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let stars = [];
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    const count = Math.floor((W * H) / 3000);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2,
        alpha: Math.random() * 0.7 + 0.1,
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2,
        pink: Math.random() < 0.04, // 4% are pink-tinted
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, W, H);
    const t = frame * 0.01;
    for (const s of stars) {
      const twinkle = s.alpha * (0.6 + 0.4 * Math.sin(t * s.speed * 100 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      if (s.pink) {
        ctx.fillStyle = `rgba(255,100,160,${twinkle})`;
      } else {
        ctx.fillStyle = `rgba(255,255,255,${twinkle})`;
      }
      ctx.fill();
    }
    frame++;
    requestAnimationFrame(draw);
  }

  resize();
  initStars();
  draw();
  window.addEventListener('resize', () => { resize(); initStars(); });
})();

let db = null;               // Firestore instance, set after SDK loads
let _firestoreReady = false; // true once SDK has initialised
let _unsubscribe = null;     // live-listener cleanup handle

function _initFirestore() {
  try {
    if (!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey.startsWith('PASTE')) return;
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    _firestoreReady = true;

    // ── Live listener: update every open tab/device the moment Firestore changes ──
    _unsubscribe = db.collection('hat').doc('state')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const data = snap.data();
        _applyRemoteState(data.active || [], data.used || []);
        // also mirror to localStorage for offline fallback
        localStorage.setItem('hat-app-v4', JSON.stringify({active: state.active, used: state.used}));
        updateCounter();
      }, err => console.warn('Firestore listener error:', err));

    db.collection('hat').doc('customCats')
      .onSnapshot(snap => {
        if (!snap.exists) return;
        const cats = snap.data().cats || [];
        localStorage.setItem('hat-custom-cats', JSON.stringify(cats));
        renderCustomCats();
      }, err => console.warn('Firestore cats listener error:', err));

  } catch(e) {
    console.warn('Firebase init failed, using localStorage only:', e);
  }
}

function _applyRemoteState(active, used) {
  const defaultMap = {};
  DEFAULT_STORIES.forEach(s => { defaultMap[s.name] = s; });
  const merge = arr => arr.map(s => ({
    ...s,
    hookShort: s.hookShort || (defaultMap[s.name] && defaultMap[s.name].hookShort) || null,
    urls: s.urls || (s.url ? [s.url] : []),
  }));
  state.active = merge(active);
  state.used   = merge(used);
}

// ══════ STATE ══════
function loadState() {
  // Try localStorage first so the UI is instant — Firestore snapshot will sync in shortly after
  try {
    const saved = localStorage.getItem('hat-app-v4');
    if (saved) {
      const p = JSON.parse(saved);
      _applyRemoteState(p.active || [], p.used || []);
    } else {
      state.active = DEFAULT_STORIES.map((s,i) => ({...s, id:i}));
      state.used = [];
    }
  } catch(e) {
    state.active = DEFAULT_STORIES.map((s,i) => ({...s, id:i}));
    state.used = [];
  }
}

function saveState() {
  // Always write to localStorage (instant, works offline)
  localStorage.setItem('hat-app-v4', JSON.stringify({active:state.active, used:state.used}));
  // Write to Firestore when available (syncs all devices)
  if (_firestoreReady && db) {
    db.collection('hat').doc('state')
      .set({ active: state.active, used: state.used })
      .catch(e => console.warn('Firestore save failed:', e));
  }
}

// ══════ CUSTOM CATEGORIES ══════
const CAT_COLOR_PALETTE = ['#d64f8e','#5ba8d4','#e89c3c','#4db89e','#9b6fe8','#e86060','#7ec87e','#c87e4d'];

function getCustomCats() {
  try { return JSON.parse(localStorage.getItem('hat-custom-cats') || '[]'); } catch(e) { return []; }
}
function saveCustomCats(cats) {
  localStorage.setItem('hat-custom-cats', JSON.stringify(cats));
  if (_firestoreReady && db) {
    db.collection('hat').doc('customCats')
      .set({ cats })
      .catch(e => console.warn('Firestore cats save failed:', e));
  }
}

function renderCustomCats() {
  const cats = getCustomCats();
  const select = document.getElementById('add-cat');
  const filters = document.getElementById('filters');
  select.querySelectorAll('[data-custom]').forEach(o => o.remove());
  filters.querySelectorAll('[data-custom]').forEach(b => b.remove());
  cats.forEach((name, i) => {
    const color = CAT_COLOR_PALETTE[i % CAT_COLOR_PALETTE.length];
    if (!CAT_COLORS[name]) CAT_COLORS[name] = color;
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name; opt.dataset.custom = '1';
    select.appendChild(opt);
    const btn = document.createElement('button');
    btn.className = 'filter-btn'; btn.dataset.cat = name; btn.dataset.custom = '1';
    btn.textContent = name;
    btn.addEventListener('click', () => setFilter(name));
    filters.appendChild(btn);
  });
}

function addCustomCat() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) return;
  const cats = getCustomCats();
  if (cats.includes(name) || CAT_COLORS[name]) { input.value = ''; return; }
  cats.push(name);
  saveCustomCats(cats);
  renderCustomCats();
  input.value = '';
}

function getFiltered() {
  if (state.filter === '__pinned__') return state.active.filter(s => s.pinned);
  if (state.filter === 'All') return state.active;
  return state.active.filter(s => s.cat === state.filter);
}

function updateCounter() {
  const count = getFiltered().length;
  const total = state.active.length;
  const el = document.getElementById('counter');
  if (state.filter === '__pinned__') {
    el.textContent = `${count} pinned`;
  } else if (state.filter === 'All') {
    el.textContent = `${total} slip${total !== 1 ? 's' : ''} remaining`;
  } else {
    el.textContent = `${count} · ${state.filter}`;
  }
  document.getElementById('no-slips').style.display = count === 0 ? 'block' : 'none';
  document.getElementById('tap-hint').style.display = count === 0 ? 'none' : 'block';
  updatePeeks(total);
}

function updatePeeks(count) {
  const img = document.getElementById('hat-img');
  if (img) img.classList.toggle('empty', count === 0);
}

// ══════ HAPTICS ══════
function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

// ══════ PULL ══════
function pullSlip() {
  if (state.animating) return;
  const pool = getFiltered();
  if (pool.length === 0) return;
  state.animating = true;
  positionHand(); // recalculate for current screen size before animating
  haptic(30);

  // Weighted pool: pinned stories appear 3× as likely
  const weighted = [];
  pool.forEach(s => { weighted.push(s); if (s.pinned) { weighted.push(s, s); } });
  const story = weighted[Math.floor(Math.random() * weighted.length)];
  state.currentSlip = story;

  // Part slips as hand enters
  const sL = document.getElementById('slips-left');
  const sR = document.getElementById('slips-right');
  if (sL && sR) {
    sL.classList.add('parting'); sR.classList.add('parting');
    setTimeout(() => { sL.classList.remove('parting'); sR.classList.remove('parting'); }, 1700);
  }

  const hand = document.getElementById('hand-container');
  hand.classList.remove('animating');
  void hand.offsetWidth;
  hand.classList.add('animating');

  setTimeout(() => showSlip(story), 1300);
  setTimeout(() => { hand.classList.remove('animating'); state.animating = false; }, 2700);
}

function showSlip(story) {
  // Set category color
  const color = CAT_COLORS[story.cat] || '#ff2d78';
  document.getElementById('card-scene').style.setProperty('--cat-color', color);

  document.getElementById('slip-cat-badge').textContent = story.cat;
  document.getElementById('slip-name-text').textContent = story.name;

  // Short hook (shown first) — fall back to full hook if no short
  const shortEl = document.getElementById('slip-hook-short');
  const longEl = document.getElementById('slip-hook-long');
  const expandBtn = document.getElementById('expand-btn');

  shortEl.textContent = story.hookShort || story.hook;
  longEl.textContent = story.hook;
  longEl.classList.remove('visible');

  // Only show expand button if there's a distinct long hook
  if (story.hookShort && story.hook && story.hookShort !== story.hook) {
    expandBtn.classList.remove('hidden');
    expandBtn.textContent = 'read more ↓';
  } else {
    expandBtn.classList.add('hidden');
  }

  // Prep notes
  const notesEl = document.getElementById('card-notes');
  if (story.notes) {
    notesEl.textContent = story.notes;
    notesEl.style.display = 'block';
  } else {
    notesEl.style.display = 'none';
  }

  // Source links
  const srcLinks = document.getElementById('source-links');
  const urls = story.urls || (story.url ? [story.url] : []);
  if (urls.length > 0) {
    srcLinks.classList.add('has-links');
    srcLinks.innerHTML = urls.map((u, i) =>
      `<button class="source-link-btn" data-idx="${i}">🔗 ${esc(u.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])}</button>`
    ).join('');
    srcLinks.querySelectorAll('.source-link-btn').forEach((btn, i) => {
      btn.onclick = (e) => { e.stopPropagation(); window.open(urls[i], '_blank', 'noopener,noreferrer'); };
    });
  } else {
    srcLinks.classList.remove('has-links');
    srcLinks.innerHTML = '';
  }

  // Reset episode input
  document.getElementById('episode-input').value = '';

  // Reflect pin state on card
  document.getElementById('card-pin-btn').classList.toggle('pinned', !!story.pinned);

  // Reset to front face
  document.getElementById('card-inner').classList.remove('flipped');
  const overlay = document.getElementById('slip-overlay');
  overlay.style.opacity = '1';
  overlay.classList.add('visible');
  spawnSparkles();
}

// ══════ CARD GLITTER ══════
function spawnSparkles() {  // kept same name so showSlip() call is unchanged
  const scene = document.getElementById('card-scene');
  if (!scene) return;
  const rect = scene.getBoundingClientRect();
  const colors = ['#ffd700','#e8c86d','#f5d76e','#c8a84b','#ffe066','#d4af37','#fcc200','#ffdf00'];
  const count  = 24;  // sparse — spread around all 4 edges

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'glitter';

    // Distribute around the card perimeter
    const edge = Math.random();
    const margin  = 6 + Math.random() * 18;   // gap outside the card boundary
    let px, py, driftAngle;

    if (edge < 0.28) {
      // top edge
      px = rect.left + Math.random() * rect.width;
      py = rect.top  - margin;
      driftAngle = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    } else if (edge < 0.56) {
      // bottom edge
      px = rect.left + Math.random() * rect.width;
      py = rect.bottom + margin;
      driftAngle =  Math.PI / 2 + (Math.random() - 0.5) * 1.2;
    } else if (edge < 0.78) {
      // left edge
      px = rect.left - margin;
      py = rect.top  + Math.random() * rect.height;
      driftAngle = Math.PI + (Math.random() - 0.5) * 1.2;
    } else {
      // right edge
      px = rect.right + margin;
      py = rect.top   + Math.random() * rect.height;
      driftAngle = 0   + (Math.random() - 0.5) * 1.2;
    }

    const driftDist = 12 + Math.random() * 20;
    const size  = 1.2 + Math.random() * 2.2;
    const dur   = 1.3 + Math.random() * 0.9;
    const delay = Math.random() * 0.45;
    const peakOp = 0.4 + Math.random() * 0.45;

    el.style.cssText = `
      left:${px - size / 2}px;
      top:${py - size / 2}px;
      width:${size}px; height:${size}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      --dur:${dur}s; --delay:${delay}s;
      --peak-op:${peakOp};
      --tx:${Math.cos(driftAngle) * driftDist}px;
      --ty:${Math.sin(driftAngle) * driftDist}px;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), (dur + delay + 0.15) * 1000);
  }
}

function flipCard() {
  haptic(15);
  document.getElementById('card-inner').classList.toggle('flipped');
}

function toggleExpand() {
  const longEl = document.getElementById('slip-hook-long');
  const expandBtn = document.getElementById('expand-btn');
  const isOpen = longEl.classList.contains('visible');
  longEl.classList.toggle('visible', !isOpen);
  expandBtn.textContent = isOpen ? 'read more ↓' : 'read less ↑';
}

function closeSlip(putBack) {
  const overlay = document.getElementById('slip-overlay');
  const scene = document.getElementById('card-scene');

  if (!putBack) {
    // Fly up animation
    haptic([20, 50, 20]);
    scene.classList.add('fly-used');
    setTimeout(() => {
      overlay.style.opacity = '';
      overlay.classList.remove('visible');
      scene.classList.remove('fly-used');
      document.getElementById('card-inner').classList.remove('flipped');
    }, 580);
  } else {
    // Gentle fade down
    scene.style.transform = 'scale(0.92) translateY(12px)';
    scene.style.opacity = '0';
    scene.style.transition = 'transform 0.22s ease, opacity 0.18s ease';
    setTimeout(() => {
      overlay.style.opacity = '';
      overlay.classList.remove('visible');
      scene.style.transform = '';
      scene.style.opacity = '';
      scene.style.transition = '';
      document.getElementById('card-inner').classList.remove('flipped');
    }, 240);
  }

  if (!putBack && state.currentSlip) {
    const episode = document.getElementById('episode-input').value.trim() || null;
    markUsed(state.currentSlip, episode);
  }
  state.currentSlip = null;
}

function markUsed(story, episode) {
  const idx = state.active.findIndex(s => s.id === story.id);
  if (idx === -1) return;
  state.active.splice(idx, 1);
  const usedStory = episode ? {...story, episode} : story;
  state.used.unshift(usedStory);
  state.lastPulled = usedStory;
  saveState(); updateCounter();
}

// ══════ RESET SESSION ══════
function resetSession() {
  state.active = [...state.active, ...state.used];
  state.used = [];
  state.lastPulled = null;
  saveState(); updateCounter();
  closeDrawer();
}


// ══════ DRAWER ══════
function openDrawer() {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('visible');
  refreshDrawer();
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('visible');
}
function refreshDrawer() {
  const q = (document.getElementById('search-input').value || '').toLowerCase().trim();
  document.getElementById('used-count').textContent = state.used.length;
  document.getElementById('active-count').textContent = state.active.length;

  const filtered = arr => q ? arr.filter(s =>
    s.name.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q) ||
    (s.notes && s.notes.toLowerCase().includes(q))
  ) : arr;

  const usedList = document.getElementById('used-list');
  const fUsed = filtered(state.used);
  usedList.innerHTML = fUsed.length === 0
    ? '<div class="empty-state">Nothing pulled yet.</div>'
    : fUsed.map(s => storyHTML(s,'used')).join('');

  const activeList = document.getElementById('active-list');
  let fActive = filtered(state.active).slice().sort((a,b) => (b.pinned ? 1 : 0) - (a.pinned ? 1 : 0));
  if (drawerPinFilter) fActive = fActive.filter(s => s.pinned);
  activeList.innerHTML = fActive.length === 0
    ? `<div class="empty-state">${drawerPinFilter ? 'No pinned stories yet.' : 'Hat is empty.'}</div>`
    : fActive.map(s => storyHTML(s,'active')).join('');

  document.querySelectorAll('.story-item').forEach(item => {
    item.addEventListener('click', e => {
      if (e.target.closest('.story-item-del')) return;
      const id = parseInt(item.dataset.id);
      const pile = item.dataset.pile;
      const arr = pile === 'used' ? state.used : state.active;
      const story = arr.find(s => s.id === id);
      if (story) openStorySheet(story, pile);
    });
  });

  document.querySelectorAll('.story-item-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(e.target.dataset.id);
      const pile = e.target.dataset.pile;
      if (pile === 'used') state.used = state.used.filter(s => s.id !== id);
      else state.active = state.active.filter(s => s.id !== id);
      saveState(); updateCounter(); refreshDrawer();
    });
  });
}

function storyHTML(s, pile) {
  const ep = (pile === 'used' && s.episode)
    ? `<div class="story-item-episode">↳ ${esc(s.episode)}</div>` : '';
  const notesDot = s.notes ? ' <span style="color:rgba(255,45,120,0.5);font-size:8px">●</span>' : '';
  const pinStar = s.pinned ? '<span class="story-pin-star">★</span>' : '';
  return `<div class="story-item" data-id="${s.id}" data-pile="${pile}" style="cursor:pointer">
    <div class="story-item-text" style="display:flex;align-items:center;gap:0">
      ${pinStar}
      <div>
        <div class="story-item-name">${esc(s.name)}${notesDot}</div>
        <div class="story-item-cat">${esc(s.cat)}</div>
        ${ep}
      </div>
    </div>
    <button class="story-item-del" data-id="${s.id}" data-pile="${pile}">×</button>
  </div>`;
}

// ══════ STORY SHEET ══════
let drawerPinFilter = false;
let sheetStory = null, sheetPile = null;

function openStorySheet(story, pile) {
  sheetStory = story; sheetPile = pile;
  const color = CAT_COLORS[story.cat] || '#ff2d78';
  const badge = document.getElementById('sheet-cat-badge');
  badge.textContent = story.cat;
  badge.style.color = color;
  document.getElementById('sheet-name').textContent = story.name;
  document.getElementById('sheet-hook-short').textContent = story.hookShort || story.hook;
  const longSec = document.getElementById('sheet-hook-long-section');
  if (story.hookShort && story.hook && story.hookShort !== story.hook) {
    document.getElementById('sheet-hook-long').textContent = story.hook;
    longSec.style.display = '';
  } else {
    longSec.style.display = 'none';
  }
  document.getElementById('sheet-notes-input').value = story.notes || '';
  document.getElementById('sheet-url-input').value = '';
  const pinBtn = document.getElementById('sheet-pin-btn');
  pinBtn.classList.toggle('pinned', !!story.pinned);
  renderSheetLinks(story.urls || (story.url ? [story.url] : []));
  const epSec = document.getElementById('sheet-episode-section');
  if (pile === 'used' && story.episode) {
    epSec.style.display = '';
    document.getElementById('sheet-episode-wrap').textContent = '↳ ' + story.episode;
  } else {
    epSec.style.display = 'none';
  }
  document.getElementById('story-sheet').classList.add('open');
  document.getElementById('story-sheet-overlay').classList.add('visible');
}

function closeStorySheet() {
  document.getElementById('story-sheet').classList.remove('open');
  document.getElementById('story-sheet-overlay').classList.remove('visible');
  sheetStory = null; sheetPile = null;
}

let sheetUrls = [];

function renderSheetLinks(urls) {
  sheetUrls = [...urls];
  const list = document.getElementById('sheet-links-list');
  list.innerHTML = sheetUrls.map((u, i) => `
    <div class="sheet-link-item">
      <a class="sheet-link-anchor" href="${esc(u)}" target="_blank" rel="noopener noreferrer">${esc(u.replace(/^https?:\/\/(www\.)?/,'').split('/')[0])}</a>
      <button class="sheet-link-del" data-idx="${i}">×</button>
    </div>`).join('');
  list.querySelectorAll('.sheet-link-del').forEach(btn => {
    btn.addEventListener('click', () => {
      sheetUrls.splice(parseInt(btn.dataset.idx), 1);
      renderSheetLinks(sheetUrls);
    });
  });
}

function addSheetLink() {
  const input = document.getElementById('sheet-url-input');
  const val = input.value.trim();
  if (!val) return;
  const url = val.startsWith('http') ? val : 'https://' + val;
  if (!sheetUrls.includes(url)) sheetUrls.push(url);
  renderSheetLinks(sheetUrls);
  input.value = '';
}

function saveSheet() {
  if (!sheetStory || !sheetPile) return;
  const arr = sheetPile === 'used' ? state.used : state.active;
  const story = arr.find(s => s.id === sheetStory.id);
  if (!story) return;
  story.notes = document.getElementById('sheet-notes-input').value.trim() || null;
  story.urls = [...sheetUrls];
  story.url = sheetUrls[0] || null; // backwards compat
  story.pinned = document.getElementById('sheet-pin-btn').classList.contains('pinned') || false;
  saveState();
  closeStorySheet();
  refreshDrawer();
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════ ADD ══════
function addStory() {
  const name = document.getElementById('add-name').value.trim();
  const hookShort = document.getElementById('add-hook-short').value.trim();
  const hook = document.getElementById('add-hook').value.trim();
  const cat = document.getElementById('add-cat').value;
  const url = document.getElementById('add-url').value.trim() || null;
  const notes = document.getElementById('add-notes').value.trim() || null;
  if (!name || !hookShort) return;
  const urls = url ? [url.startsWith('http') ? url : 'https://' + url] : [];
  state.active.push({id:Date.now(), name, hookShort, hook: hook || hookShort, cat, url: urls[0] || null, urls, notes});
  saveState(); updateCounter();
  document.getElementById('add-name').value = '';
  document.getElementById('add-hook-short').value = '';
  document.getElementById('add-hook').value = '';
  document.getElementById('add-url').value = '';
  document.getElementById('add-notes').value = '';
  refreshDrawer();
}

// ══════ EXPORT ══════
function exportStories() {
  const all = [...state.active, ...state.used];
  const text = all.map(s => `${s.name} | ${s.hook} | ${s.cat}`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type:'text/plain'}));
  a.download = 'hat-stories.txt';
  a.click();
}

// ══════ FILTER ══════
function setFilter(cat) {
  state.filter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  updateCounter();
}

// ══════ HAND POSITIONING ══════
// Calculates exact pixel translateX/top values based on the hat's real rendered layout,
// so the animation aligns perfectly on every screen size and device.
function positionHand() {
  const hand  = document.getElementById('hand-container');
  const stage = document.getElementById('hat-stage');
  if (!hand || !stage) return;

  const hw = hand.offsetWidth;
  const hh = hand.offsetHeight;
  const sw = stage.offsetWidth;
  const sh = stage.offsetHeight;
  if (!hw || !hh || !sw || !sh) return;  // image not yet rendered — skip

  // Hat opening (where cards fan out) is roughly the top 20% of the stage height
  const hatOpeningY = sh * 0.20;
  // Fingers sit at ~50% from the top of the landscape arm image
  const fingerFromTop = hh * 0.50;
  // Set top so fingers land right at the hat opening
  hand.style.top = (hatOpeningY - fingerFromTop) + 'px';

  // Horizontal: after scaleX(-1) flip, fingers are at the RIGHT edge of the container.
  // Peak position = right edge reaches ~50% of stage width (hat center), slightly inside.
  const hatCenterX = sw * 0.50;
  const peakX  = hatCenterX - hw + 50;          // fingers slightly inside hat
  const holdX  = peakX - 10;                    // micro-pullback for grab feel
  const enterX = peakX - hw * 0.55;             // halfway sweep point
  const startX = -(hw + sw + 80);               // fully off left — arm never seen

  const r = document.documentElement;
  r.style.setProperty('--hand-x-start', startX + 'px');
  r.style.setProperty('--hand-x-enter', enterX + 'px');
  r.style.setProperty('--hand-x-peak',  peakX  + 'px');
  r.style.setProperty('--hand-x-hold',  holdX  + 'px');
  r.style.setProperty('--hand-x-exit',  startX + 'px');
}

// ══════ BOOT ══════
loadState();
renderCustomCats();
updateCounter();
_initFirestore(); // connects to Firebase after local state is shown

// Position hand once image loads, and re-position on every resize
const _handImg = document.querySelector('#hand-container img');
if (_handImg) {
  if (_handImg.complete) positionHand();
  else _handImg.addEventListener('load', positionHand);
}
window.addEventListener('resize', positionHand);

// ══════ SHOOTING STARS ══════
function spawnShootingStar() {
  const el = document.createElement('div');
  el.className = 'shooting-star';
  const angle  = 28 + Math.random() * 18;
  // Only spawn in upper 20% of viewport — pure sky, well above the hat
  const startX = Math.random() * window.innerWidth * 0.7;
  const startY = Math.random() * window.innerHeight * 0.20;
  el.style.cssText = `left:${startX}px; top:${startY}px; --angle:${angle}deg;`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}
(function scheduleShootingStar() {
  setTimeout(() => { spawnShootingStar(); scheduleShootingStar(); },
    16000 + Math.random() * 14000); // every 16–30 s
}());

document.getElementById('hat-stage').addEventListener('click', pullSlip);
document.getElementById('slip-overlay-bg').addEventListener('click', () => closeSlip(true));
document.getElementById('card-front').addEventListener('click', flipCard);
document.getElementById('card-pin-btn').addEventListener('click', e => {
  e.stopPropagation();
  const story = state.currentSlip;
  if (!story) return;
  const target = state.active.find(s => s.id === story.id) || state.used.find(s => s.id === story.id);
  if (!target) return;
  target.pinned = !target.pinned;
  story.pinned = target.pinned;
  document.getElementById('card-pin-btn').classList.toggle('pinned', target.pinned);
  saveState();
  refreshDrawer();
});
document.getElementById('card-back').addEventListener('click', (e) => {
  if (!e.target.closest('.slip-btn') && !e.target.closest('.expand-btn') && !e.target.closest('#episode-input-wrap') && !e.target.closest('#source-btn')) flipCard();
});
document.getElementById('expand-btn').addEventListener('click', (e) => { e.stopPropagation(); toggleExpand(); });
document.getElementById('btn-mark-used').addEventListener('click', (e) => { e.stopPropagation(); closeSlip(false); });
document.getElementById('btn-close-slip').addEventListener('click', (e) => { e.stopPropagation(); closeSlip(true); });
document.getElementById('reset-btn').addEventListener('click', resetSession);

});
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
document.querySelectorAll('.filter-btn').forEach(b => b.addEventListener('click', () => setFilter(b.dataset.cat)));

document.getElementById('new-cat-btn').addEventListener('click', addCustomCat);

document.getElementById('story-sheet-overlay').addEventListener('click', closeStorySheet);
document.getElementById('sheet-close-btn').addEventListener('click', closeStorySheet);
document.getElementById('sheet-pin-btn').addEventListener('click', () => {
  document.getElementById('sheet-pin-btn').classList.toggle('pinned');
});
document.getElementById('sheet-save-btn').addEventListener('click', saveSheet);
document.getElementById('sheet-add-link-btn').addEventListener('click', addSheetLink);
document.getElementById('sheet-url-input').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addSheetLink(); } });
